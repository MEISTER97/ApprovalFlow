services:

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger Web UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    networks:          
      - approval-network
  redis:
    image: "redis:alpine"
    networks:
      - approval-network

  placement:
    image: "daprio/placement:latest"
    command: ["./placement", "-port", "50005"]
    ports:
      - "50005:50005"
    networks:
      - approval-network

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8080:8080" # The ONLY port open to your computer/UI
    environment:
      - DAPR_HTTP_PORT=3500
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      - redis
    networks:
      - approval-network

  api-gateway-dapr:
    image: "daprio/daprd:1.13.0"
    command: [
      "./daprd",
      "-app-id", "api-gateway",
      "-app-port", "8080",
      "-dapr-http-port", "3500",
      "-resources-path", "/components",
      "-placement-host-address", "placement:50005" # FIXED: Switched from 50006 to 50005
    ]
    volumes:
      - "./dapr-components:/components"
    depends_on:
      - api-gateway
    network_mode: "service:api-gateway"

  workflow-service:
    build:
      context: ./workflow-service
    environment:
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      - redis
    networks:
      - approval-network

  workflow-service-dapr:
    image: "daprio/daprd:1.13.0"
    command: [
      "./daprd",
      "-app-id", "workflow-service",
      "-app-port", "8080",
      "-resources-path", "/components",
      "-placement-host-address", "placement:50005"
    ]
    volumes:
      - "./dapr-components:/components"
    depends_on:
      - workflow-service
    network_mode: "service:workflow-service"
    
  ai-service:
    build:
      context: ./ai-service
    # REMOVED host ports mapping
    environment:
      - AUTONOMY_CEILING=${AUTONOMY_CEILING}
      - AUTONOMY_CONFIDENCE=${AUTONOMY_CONFIDENCE}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_PROVIDER=gemini
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    volumes:
      - ./ai-service/policy.md:/app/policy.md:ro
    depends_on:
      - redis
    networks:
      - approval-network

  ai-service-dapr:
    image: "daprio/daprd:1.13.0"
    command: [
      "./daprd",
      "-app-id", "ai-service",
      "-app-port", "8000",
      "-resources-path", "/components",
      "-placement-host-address", "placement:50005"
    ]
    volumes:
      - "./dapr-components:/components"
    depends_on:
      - ai-service
    network_mode: "service:ai-service"

  payment-service:
    build: ./payment-service
    # REMOVED host ports mapping
    environment:
      - DAPR_GRPC_PORT=50001
      - DAPR_HTTP_PORT=3500
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      - redis
    networks:
      - approval-network

  payment-service-dapr:
    image: "daprio/daprd:1.13.0"
    command: [
      "./daprd",
      "-app-id", "payment-service",
      "-app-port", "8001",
      "-dapr-http-port", "3500",
      "-dapr-grpc-port", "50001",
      "-resources-path", "/components",
      "-placement-host-address", "placement:50005"
    ]
    volumes:
      - "./dapr-components:/components"
    depends_on:
      - payment-service
    network_mode: "service:payment-service"

networks:
  approval-network:
    driver: bridge